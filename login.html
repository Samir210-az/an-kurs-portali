<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kurs Girişi — AN Psixoloji Dəstək və Reabilitasiya Mərkəzi</title>
<link rel="icon" href="logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#0c211f; --bg-deep-2:#153431; --bg-deep-3:#1d423d;
    --gold:#d9a85a; --gold-light:#f0cd8e;
    --cream:#f3eee1; --cream-dim:#c9c2ae; --sage:#7ba098; --danger:#d9705a;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:
      radial-gradient(circle at 30% 20%, rgba(217,168,90,0.14), transparent 45%),
      radial-gradient(circle at 75% 70%, rgba(123,160,152,0.12), transparent 50%),
      linear-gradient(180deg, var(--bg-deep) 0%, var(--bg-deep-2) 55%, var(--bg-deep-3) 100%);
    color:var(--cream); font-family:'Inter',sans-serif; padding:1.5rem;
  }
  .card{
    background:rgba(18,48,44,0.75); border:1px solid rgba(217,168,90,0.2); border-radius:22px;
    padding:2.8rem 2.4rem; width:min(400px,92vw); text-align:center; backdrop-filter:blur(10px);
    animation:fadeUp .8s ease;
  }
  @keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
  .card img{width:72px;margin-bottom:1.2rem;filter:drop-shadow(0 4px 16px rgba(217,168,90,0.35));animation:float 6s ease-in-out infinite;}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
  h1{font-family:'Fraunces',serif;font-weight:500;font-size:1.5rem;margin-bottom:0.4rem;
     background:linear-gradient(100deg,var(--cream) 30%,var(--gold-light) 60%,var(--cream) 85%);
     -webkit-background-clip:text;background-clip:text;color:transparent;background-size:200% auto;}
  .sub{color:var(--cream-dim);font-size:0.88rem;margin-bottom:2rem;}
  input{
    width:100%;padding:0.85rem 1rem;border-radius:12px;border:1px solid rgba(217,168,90,0.25);
    background:rgba(255,255,255,0.05);color:var(--cream);font-size:0.95rem;margin-bottom:1rem;
  }
  input:focus{outline:none;border-color:var(--gold);}
  .btn{
    width:100%;padding:0.85rem;border-radius:999px;border:none;cursor:pointer;
    background:linear-gradient(120deg,var(--gold),var(--gold-light));color:#2a1d09;font-weight:600;font-size:0.95rem;
    transition:transform .3s ease; margin-top:0.4rem;
  }
  .btn:hover{transform:translateY(-2px);}
  .btn:disabled{opacity:0.6;cursor:not-allowed;transform:none;}
  .err{color:var(--danger);font-size:0.85rem;min-height:1.1rem;margin:-0.4rem 0 0.6rem;}
  .notice{
    margin-top:1.2rem;padding:0.7rem 0.9rem;border-radius:10px;font-size:0.8rem;
    background:rgba(123,160,152,0.12);border:1px solid rgba(123,160,152,0.3);color:var(--sage);
    display:none;text-align:left;
  }
  .course-list{display:none;flex-direction:column;gap:0.7rem;margin-top:1rem;}
  .course-btn{
    display:block;padding:0.9rem 1rem;border-radius:12px;text-decoration:none;
    background:rgba(217,168,90,0.1);border:1px solid rgba(217,168,90,0.3);color:var(--gold-light);
    font-weight:600;font-size:0.92rem;transition:all .25s ease;
  }
  .course-btn:hover{background:rgba(217,168,90,0.2);transform:translateY(-2px);}
  a.back{display:inline-block;margin-top:1.6rem;color:var(--sage);font-size:0.82rem;text-decoration:none;}
  .spinner{display:none;width:18px;height:18px;border:2px solid rgba(42,29,9,0.3);border-top-color:#2a1d09;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto;}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="card">
  <img src="logo.png" alt="logo">
  <h1>Kurs Girişi</h1>
  <div class="sub">AN Psixoloji Dəstək və Reabilitasiya Mərkəzi</div>

  <div id="formArea">
    <input type="text" id="username" placeholder="İstifadəçi adı" autocomplete="username">
    <input type="password" id="password" placeholder="Parol" autocomplete="current-password">
    <div class="err" id="errMsg"></div>
    <button class="btn" id="loginBtn" onclick="doLogin()">
      <span id="btnText">Daxil ol</span>
      <div class="spinner" id="spinner"></div>
    </button>
    <div class="notice" id="deviceNotice"></div>
  </div>

  <div class="course-list" id="courseList"></div>

  <a class="back" href="index.html">← Ana səhifəyə qayıt</a>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getDatabase, ref, get, update } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCBhyGNzZRGgQShP_C9kwAzTm_g_0zJlzg",
  authDomain: "an-psixoloji-33442.firebaseapp.com",
  databaseURL: "https://an-psixoloji-33442-default-rtdb.firebaseio.com",
  projectId: "an-psixoloji-33442",
  storageBucket: "an-psixoloji-33442.firebasestorage.app",
  messagingSenderId: "528809299356",
  appId: "1:528809299356:web:59cae89a64e446dc520c59"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

function simpleFingerprint(){
  const raw = [navigator.userAgent, navigator.language, screen.width+'x'+screen.height, Intl.DateTimeFormat().resolvedOptions().timeZone].join('|');
  let hash = 0;
  for(let i=0;i<raw.length;i++){ hash = (hash<<5)-hash + raw.charCodeAt(i); hash |= 0; }
  return 'fp_' + Math.abs(hash).toString(16);
}

async function getIP(){
  try{
    const res = await fetch('https://api.ipify.org?format=json');
    const data = await res.json();
    return data.ip;
  }catch(e){ return 'naməlum'; }
}

window.doLogin = async function(){
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();
  const errEl = document.getElementById('errMsg');
  const btn = document.getElementById('loginBtn');
  errEl.textContent = '';
  if(!username || !password){ errEl.textContent = 'İstifadəçi adı və parolu daxil edin'; return; }

  document.getElementById('btnText').style.display='none';
  document.getElementById('spinner').style.display='block';
  btn.disabled = true;

  try{
    const custSnap = await get(ref(db, 'portal/customers'));
    const customers = custSnap.val() || {};
    const entry = Object.entries(customers).find(([id,c]) => c.username === username);

    if(!entry || entry[1].password !== password){
      errEl.textContent = 'İstifadəçi adı və ya parol yanlışdır';
      resetBtn();
      return;
    }

    const [custId, cust] = entry;
    const device = simpleFingerprint();
    const ip = await getIP();

    // security check
    if(cust.lastDevice && cust.lastDevice !== device){
      await pushAlert(cust.username, 'device_changed', cust.lastDevice, device);
      showNotice('Diqqət: bu hesaba yeni bir cihazdan giriş edildi. Bu barədə admin məlumatlandırıldı.');
    } else if(cust.lastIP && cust.lastIP !== ip){
      await pushAlert(cust.username, 'ip_changed', cust.lastIP, ip);
    }

    await update(ref(db, 'portal/customers/'+custId), {
      lastDevice: device, lastIP: ip, lastLogin: Date.now()
    });

    const coursesSnap = await get(ref(db, 'portal/courses'));
    const allCourses = coursesSnap.val() || {};
    const allowed = (cust.allowedCourses||[]).map(cid => allCourses[cid]).filter(Boolean);

    if(!allowed.length){
      errEl.textContent = 'Hesabınıza hələ heç bir kurs təyin olunmayıb. Admin ilə əlaqə saxlayın.';
      resetBtn();
      return;
    }

    document.getElementById('formArea').style.display = 'none';
    const list = document.getElementById('courseList');
    list.style.display = 'flex';
    if(allowed.length === 1){
      list.innerHTML = `<div style="color:var(--cream-dim);font-size:0.88rem;margin-bottom:0.6rem">Kursunuza yönləndirilirsiniz...</div>`;
      setTimeout(()=>{ location.href = allowed[0].url; }, 900);
    } else {
      list.innerHTML = allowed.map(c => `<a class="course-btn" href="${c.url}">${escapeHtml(c.name)} →</a>`).join('');
    }
  }catch(e){
    console.error(e);
    errEl.textContent = 'Xəta baş verdi, yenidən cəhd edin';
    resetBtn();
  }

  function resetBtn(){
    document.getElementById('btnText').style.display='inline';
    document.getElementById('spinner').style.display='none';
    btn.disabled = false;
  }
}

async function pushAlert(username, type, oldValue, newValue){
  const { push, ref: r } = await import("https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js");
  return push(r(db, 'portal/securityAlerts'), { username, type, oldValue, newValue, ts: Date.now() });
}

function showNotice(msg){
  const el = document.getElementById('deviceNotice');
  el.textContent = msg;
  el.style.display = 'block';
}

function escapeHtml(s){ return String(s??'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

document.getElementById('password').addEventListener('keydown', e=>{ if(e.key==='Enter') window.doLogin(); });
</script>
</body>
</html>
